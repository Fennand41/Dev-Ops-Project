name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Flask Flask-SQLAlchemy Flask-Login Flask-Bcrypt pytest flake8 bandit

    - name: Linting (flake8)
      run: |
        # Запуск лінтера для перевірки синтаксису
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exit-zero

    - name: Security scan (bandit)
      run: |
        # Запуск сканера безпеки
        bandit -r . -ll -ii -s B101

    - name: Run unit test
      run: |
        # Запуск тесту
        pytest test.py