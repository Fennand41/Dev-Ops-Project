name: Lab 3 Pipeline

on:
  push:
    branches: [ "lab-chapter1" ]

jobs:
  # ==========================================
  # STAGE 1: Test (без деплою)
  # ==========================================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install Flask Flask-SQLAlchemy Flask-Login Flask-Bcrypt pytest
      - name: Run unit test
        run: pytest test.py